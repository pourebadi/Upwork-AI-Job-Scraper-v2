name: Upwork Scraper

on:
  workflow_dispatch:
    inputs:
      trigger_source:
        description: "Source that triggered this run"
        required: false
        default: "manual"
        type: string
      setup_only:
        description: "Only refresh Notion workspace/views; skip scraping"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    # Runs automatically every 3 hours. GitHub cron is UTC.
    - cron: "0 */3 * * *"

concurrency:
  group: upwork-scraper-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Notion-controlled scraper
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          MAX_JOB_AGE_DAYS: ${{ secrets.MAX_JOB_AGE_DAYS }}
          RUN_TRIGGER_SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.trigger_source || 'schedule' }}
          SETUP_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.setup_only || 'false' }}
        run: python run_notion_controlled_scraper.py
