name: Proposal Worker

on:
  workflow_dispatch:
    inputs:
      trigger_source:
        description: "Source that triggered this run"
        required: false
        default: "manual"
        type: string
      notion_page_id:
        description: "Optional Notion page id to process immediately"
        required: false
        type: string
  schedule:
    - cron: "*/5 * * * *"

jobs:
  generate-proposals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate requested proposals
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          NOTION_TARGET_PAGE_ID: ${{ inputs.notion_page_id }}
        run: python generate_requested_proposals.py
